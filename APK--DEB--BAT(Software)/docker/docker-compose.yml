services:
  postgres:
    image: postgres:16-alpine
    container_name: gerenciador-erp-db
    environment:
      POSTGRES_DB: gerenciador_estoque
      POSTGRES_USER: gerenciador_erp
      POSTGRES_PASSWORD: CHANGE_ME
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/setup.sql:/docker-entrypoint-initdb.d/setup.sql
    restart: unless-stopped
    networks:
      - erp-network

  app:
    build: ../..
    image: gerenciador-erp:latest
    container_name: gerenciador-erp-app
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gerenciador_estoque
      DB_USER: gerenciador_erp
      DB_PASSWORD: CHANGE_ME
      APP_HOST: 0.0.0.0
      APP_PORT: 4568
      APP_ENV: production
      SESSION_SECRET: CHANGE_ME
    ports:
      - "4568:4568"
    volumes:
      - app-logs:/app/logs
      - app-storage:/app/storage
      - app-backups:/app/backups
    restart: unless-stopped
    networks:
      - erp-network

volumes:
  pgdata:
  app-logs:
  app-storage:
  app-backups:

networks:
  erp-network:
    driver: bridge
